<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" class="beam-diagram-svg">
  <defs>
    <linearGradient id="concreteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#547792;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1A3263;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAB95B"/>
      <stop offset="100%" style="stop-color:#e09a2e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Beam outline -->
  <rect x="40" y="40" width="200" height="240" rx="4" fill="url(#concreteGrad)" stroke="#1A3263" stroke-width="2" filter="url(#shadow)"/>
  <!-- Reinforcement bars (circles at bottom) -->
  <circle cx="80" cy="270" r="8" fill="url(#steelGrad)" stroke="#1A3263" stroke-width="1.5"/>
  <circle cx="120" cy="270" r="8" fill="url(#steelGrad)" stroke="#1A3263" stroke-width="1.5"/>
  <circle cx="160" cy="270" r="8" fill="url(#steelGrad)" stroke="#1A3263" stroke-width="1.5"/>
  <circle cx="200" cy="270" r="8" fill="url(#steelGrad)" stroke="#1A3263" stroke-width="1.5"/>
  <!-- Dimension: width (b) -->
  <line x1="40" y1="290" x2="240" y2="290" stroke="#1A3263" stroke-width="1"/>
  <line x1="40" y1="288" x2="40" y2="292" stroke="#1A3263" stroke-width="1"/>
  <line x1="240" y1="288" x2="240" y2="292" stroke="#1A3263" stroke-width="1"/>
  <text x="140" y="308" text-anchor="middle" fill="#1A3263" font-family="Poppins, sans-serif" font-size="14" font-weight="600">b</text>
  <!-- Dimension: height (h) -->
  <line x1="250" y1="40" x2="250" y2="280" stroke="#1A3263" stroke-width="1"/>
  <line x1="248" y1="40" x2="252" y2="40" stroke="#1A3263" stroke-width="1"/>
  <line x1="248" y1="280" x2="252" y2="280" stroke="#1A3263" stroke-width="1"/>
  <text x="268" y="165" text-anchor="middle" fill="#1A3263" font-family="Poppins, sans-serif" font-size="14" font-weight="600" transform="rotate(90, 268, 165)">h</text>
  <!-- Dimension: effective depth (d) - dashed line -->
  <line x1="50" y1="40" x2="50" y2="270" stroke="#1A3263" stroke-width="1" stroke-dasharray="4,4" opacity="0.8"/>
  <text x="30" y="160" text-anchor="middle" fill="#547792" font-family="Poppins, sans-serif" font-size="12" font-weight="500" transform="rotate(-90, 30, 160)">d</text>
  <!-- dc (cover) indicator -->
  <line x1="50" y1="40" x2="50" y2="55" stroke="#547792" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="25" y="50" text-anchor="middle" fill="#547792" font-family="Poppins, sans-serif" font-size="11">dc</text>
</svg>
